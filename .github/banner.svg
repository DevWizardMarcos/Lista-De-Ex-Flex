<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#grad1)"/>
  <rect width="1200" height="300" fill="url(#grad2)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="50" r="30" fill="#ffffff" opacity="0.1"/>
  <circle cx="1100" cy="250" r="40" fill="#ffffff" opacity="0.1"/>
  <circle cx="200" cy="280" r="20" fill="#ffffff" opacity="0.1"/>
  <circle cx="1050" cy="80" r="25" fill="#ffffff" opacity="0.1"/>
  
  <!-- Python icon -->
  <g transform="translate(80, 100)">
    <path d="M 20 0 L 60 0 C 70 0 80 10 80 20 L 80 60 L 40 60 L 40 70 L 0 70 L 0 20 C 0 10 10 0 20 0 Z" fill="#FFD43B"/>
    <path d="M 60 80 L 20 80 C 10 80 0 70 0 60 L 0 20 L 40 20 L 40 10 L 80 10 L 80 60 C 80 70 70 80 60 80 Z" fill="#4B8BBE"/>
    <circle cx="25" cy="25" r="5" fill="#4B8BBE"/>
    <circle cx="55" cy="55" r="5" fill="#FFD43B"/>
  </g>
  
  <!-- Main title -->
  <text x="200" y="130" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">
    Lista De Exercícios Flex
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="170" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" opacity="0.9">
    Aprenda Python do Básico ao Avançado
  </text>
  
  <!-- Stats -->
  <g transform="translate(200, 200)">
    <rect width="180" height="50" rx="10" fill="#ffffff" opacity="0.2"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🎯 181+ Exercícios
    </text>
  </g>
  
  <g transform="translate(400, 200)">
    <rect width="180" height="50" rx="10" fill="#ffffff" opacity="0.2"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🏆 25+ Projetos
    </text>
  </g>
  
  <g transform="translate(600, 200)">
    <rect width="180" height="50" rx="10" fill="#ffffff" opacity="0.2"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
      📚 6 Tópicos
    </text>
  </g>
</svg>
